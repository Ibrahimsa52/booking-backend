<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول | لوحة التحكم</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .login-wrapper {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 48px 40px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
        }

        .login-logo {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            margin-bottom: 36px;
        }

        .login-logo i {
            font-size: 44px;
            color: var(--color-primary);
        }

        .login-logo h1 {
            font-size: 22px;
            font-weight: 700;
            color: var(--text-main);
        }

        .login-logo p {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: -8px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 20px;
        }

        .form-group label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-main);
        }

        .form-group input {
            padding: 12px 16px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-family: inherit;
            background: var(--bg-body);
            color: var(--text-main);
            outline: none;
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            border-color: var(--color-primary);
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: var(--color-primary);
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 16px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-login:hover {
            opacity: 0.9;
        }

        .error-msg {
            display: none;
            background: var(--color-danger-bg);
            color: var(--color-danger);
            border-radius: var(--radius-sm);
            padding: 12px 16px;
            margin-bottom: 16px;
            font-size: 14px;
        }
    </style>
</head>

<body>
    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-logo">
                <i class="ph ph-calendar-check"></i>
                <h1>لوحة التحكم</h1>
                <p>سجل دخولك للمتابعة</p>
            </div>

            <div id="login-error" class="error-msg"></div>

            <form id="login-form">
                <div class="form-group">
                    <label for="username">اسم المستخدم</label>
                    <input type="text" id="username" placeholder="أدخل اسم المستخدم" autocomplete="username" required>
                </div>
                <div class="form-group">
                    <label for="password">كلمة المرور</label>
                    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"
                        required>
                </div>
                <button type="submit" class="btn-login">تسجيل الدخول</button>
            </form>
        </div>
    </div>

    <script>
        // Apply saved theme
        const t = localStorage.getItem('theme');
        if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.setAttribute('data-theme', 'dark');
        }

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('login-error');
            errorDiv.style.display = 'none';

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (!res.ok) {
                    errorDiv.textContent = data.error || 'خطأ في تسجيل الدخول.';
                    errorDiv.style.display = 'block';
                    return;
                }
                localStorage.setItem('dash_token', data.token);
                localStorage.setItem('dash_user', JSON.stringify({ username: data.username, role: data.role }));
                window.location.href = '/dashboard/';
            } catch (err) {
                errorDiv.textContent = 'تعذر الاتصال بالخادم.';
                errorDiv.style.display = 'block';
            }
        });
    </script>
</body>

</html>
